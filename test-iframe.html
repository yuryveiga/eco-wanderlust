<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Iframe</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        iframe { width: 100%; height: 600px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Teste de Iframe para Maracanã Calendar</h1>
        <p>Se você ver o calendário abaixo, o iframe está funcionando corretamente.</p>
        <iframe 
            title="Calendário do Estádio Maracanã" 
            src="https://maracanamatchday.com/calendar" 
            allowFullScreen
            sandbox="allow-scripts allow-same-origin allow-popups"
        ></iframe>
        <p>Se você não vê nada acima, abra as ferramentas de desenvolvedor (F12) e verifique o console por erros.</p>
    </div>
</body>
</html>
